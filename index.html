<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhyora - Portal</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Yatra+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#0b111e">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Adhyora">
    
    <link rel="apple-touch-icon" href="../AdhyoraSplashLogo5.png">

    <script>
    // Save the intention so it survives the login redirect!
    if (window.location.hash === "#inbox") {
        localStorage.setItem("pendingInboxOpen", "true");
    }
    if (window.location.hash === "#notifications") {
        localStorage.setItem("pendingNotifOpen", "true");
    }
    if (window.location.hash === "#assignments") {
        localStorage.setItem("pendingAssignOpen", "true");
    }
    if (window.location.hash === "#teacher_requests") {
        localStorage.setItem("pendingTeacherReqOpen", "true");
    }
    if (window.location.hash === "#events") {
        localStorage.setItem("pendingEventReqOpen", "true");
    }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
</head>
<body>

    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <p class="splash-subtitle">Powered by Pixelaks Technologies</p>
            <h1 class="splash-title">ADHYORA</h1>
            <div class="splash-glow"></div>
        </div>
    </div>

    <div id="tsparticles"></div>

    <div class="app-container">
        <div class="header">
            <div class="scanlines"></div>
            <h1 class="glitch-wrapper" aria-label="Adhyora">
                <span class="main-text" id="text-main">ADHYORA</span>
                <span class="glitch-layer layer-red" id="text-red" aria-hidden="true">ADHYORA</span>
                <span class="glitch-layer layer-blue" id="text-blue" aria-hidden="true">ADHYORA</span>
            </h1>
            <p class="subtitle">Academic Management System</p>
        </div>

        <div id="roleSelectionPanel" class="panel active">
            <select id="collegeDropdown" class="input-field">
                <option value="" disabled selected>Loading Colleges...</option>
            </select>
            
            <select id="roleDropdown" class="input-field">
                <option value="" disabled selected>Select Role</option>
                <option value="Student">Student</option>
                <!-- 🚨 UNLOCKED TEACHER OPTION -->
                <option value="Teacher">Teacher</option>
                <option value="Principal">Principal</option>
            </select>

            <button id="continueBtn" class="primary-btn" disabled>Continue</button>
        </div>

        <div id="signInPanel" class="panel">
            <h2 class="panel-title" id="signInTitle">SignIn</h2>
            
            <input type="email" id="loginEmail" class="input-field" placeholder="Email...">
            
            <!-- 🚨 ADDED: Room Code for Teacher Login -->
            <input type="text" id="loginRoomCode" class="input-field" placeholder="Room Code..." style="display: none;">
            
            <div class="password-container">
                <!-- 🚨 BANK GRADE SHIELD: autocomplete="new-password" + readonly trick -->
                <input type="password" id="loginPassword" class="input-field" placeholder="Password..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <span class="toggle-password" onclick="toggleVisibility('loginPassword', this)">
                    <i class="fas fa-eye"></i>
                </span>
            </div>

            <a href="javascript:void(0);" onclick="switchPanel('forgotPasswordPanel')" class="text-link forgot-pass">Forgot Password?</a>

            <button id="signInBtn" class="primary-btn">SignIn</button>

            <p class="switch-panel-text">
                Don't have an account?<br>
                <a href="javascript:void(0);" onclick="switchPanel('registerPanel')" class="text-link">Create One</a>
            </p>
        </div>

        <div id="registerPanel" class="panel">
            <h2 class="panel-title" id="registerTitle">Register</h2> 
            
            <input type="text" id="regName" class="input-field" placeholder="Name...">
            <!-- Security Inputs Hidden by Default -->
            <input type="text" id="regRollNo" class="input-field" placeholder="RollNumber..." style="display: none;">
            <!-- 🚨 ADDED: Room Code for Teacher Registration -->
            <input type="text" id="regRoomCode" class="input-field" placeholder="Room Code..." style="display: none;">
            
            <input type="email" id="regEmail" class="input-field" placeholder="Email...">
            
            <div class="password-container">
                <!-- 🚨 BANK GRADE SHIELD -->
                <input type="password" id="regPassword" class="input-field" placeholder="Password..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <span class="toggle-password" onclick="toggleVisibility('regPassword', this)">
                    <i class="fas fa-eye"></i>
                </span>
            </div>

            <div class="password-container">
                <!-- 🚨 BANK GRADE SHIELD -->
                <input type="password" id="regConfirmPassword" class="input-field" placeholder="Confirm Password..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <span class="toggle-password" onclick="toggleVisibility('regConfirmPassword', this)">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
            
            <p id="passwordFeedback" class="feedback-text"></p>

            <button id="registerBtn" class="primary-btn">Register</button>

            <p class="switch-panel-text">
                Already have an account?<br>
                <a href="javascript:void(0);" onclick="switchPanel('signInPanel')" class="text-link">SignIn</a>
            </p>
        </div>

        <div id="forgotPasswordPanel" class="panel">
            <h2 class="panel-title">Reset Password</h2>
            
            <input type="email" id="forgotEmail" class="input-field" placeholder="Enter your registered email...">
            
            <button id="resetPasswordBtn" class="primary-btn">Send Reset Link</button>
        
            <p class="switch-panel-text">
                Remember your password?<br>
                <a href="javascript:void(0);" onclick="switchPanel('signInPanel')" class="text-link">Back to SignIn</a>
            </p>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // IMPORTANT: Replace 'firebase-messaging-sw.js' if you named your file something else!
                navigator.serviceWorker.register('./firebase-messaging-sw.js')
                    .then(reg => console.log('Service Worker Registered for PWA!', reg))
                    .catch(err => console.error('Service Worker Registration Failed!', err));
            });
        }
    </script>

    <script type="module" src="version-check.js"></script>
</body>
</html>
